{% extends "base.html" %}

{% block title %}Login | Hospital Management{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/auth.css">
{% endblock %}

{% block content %}
<div class="auth-card login-card glass-card animate" style="margin: 50px auto;">
    <div class="auth-header">
        <div class="logo" style="justify-content: center; margin-bottom: 5px;">Hospital <span>Management</span></div>
        <h2>Member Login</h2>
        <p>Access your premium medical portal</p>
    </div>
    <form id="loginForm" autocomplete="off">
        <input type="text" style="display:none;"><input type="password" style="display:none;">

        <div id="errorMsg" class="error-msg"></div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter your username" autocomplete="off" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="new-password" required>
        </div>
        <button type="submit" id="loginBtn" class="btn btn-primary" style="width: 100%;">Sign In →</button>
    </form>
    <div class="auth-footer">
        New here? <a href="/register/">Create Account</a>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/login.js"></script>
{% endblock %}
